<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Ambar — Portfolio</title>
  <meta name="description"
    content="Full Stack Developer crafting scalable apps, real-time systems, and AI-powered experiences." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <!-- Preconnect to Google Fonts for faster resolution -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Inter font — display=swap prevents FOIT -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />

  <!--
    ✅ REMOVED:
      - <script src="three.min.js"> — This was the primary cause of ALL errors:
          1. It loaded the DEPRECATED build/three.min.js (removed in r160+).
          2. It created a GLOBAL window.THREE instance completely separate from
             Vite's bundled copy, causing the "Multiple instances of Three.js"
             warning from both three-globe and @splinetool/runtime.
          3. The instance collision corrupted three-globe's method chain, causing
             "barsData is not a function" because the Globe object was built
             against one THREE instance but the renderer expected another.
      - <script src="three-globe.min.js"> — Same issue; now bundled by Vite.
      - <script type="module" src="spline-viewer.js"> — SplineRobot.tsx uses
          @splinetool/runtime directly on a <canvas>, so the web component
          script is unnecessary and was loading yet another THREE copy.

    ✅ three, three-globe, and @splinetool/runtime are all imported as ES
       modules inside the app bundle. Vite's `resolve.dedupe: ["three"]` in
       vite.config.ts guarantees exactly one copy of Three.js across all
       packages — no globals, no conflicts.
  -->
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
